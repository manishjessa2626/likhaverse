version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    container_name: likhaverse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: likhaverse
      POSTGRES_USER: likhaverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-likhaverse_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U likhaverse"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: likhaverse-cache
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: likhaverse-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      REDIS_URL: redis://redis:6379
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: likhaverse-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: likhaverse-gateway
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging

  backup:
    image: alpine:3.19
    container_name: likhaverse-backup
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data:ro
      - ./backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: |
      sh -c '
        apk add --no-cache postgresql-client
        while true; do
          /usr/local/bin/backup.sh
          sleep 86400
        done
      '
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: likhaverse
      POSTGRES_USER: likhaverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-likhaverse_dev}
      BACKUP_RETENTION_DAYS: 30
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
