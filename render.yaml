services:
  - type: web
    name: likhaverse
    env: node
    buildCommand: npx prisma generate && npx next build
    startCommand: npx prisma db push --accept-data-loss && npx next start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
