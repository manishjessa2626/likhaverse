version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: likhaverse-db
    environment:
      POSTGRES_DB: likhaverse
      POSTGRES_USER: likhaverse
      POSTGRES_PASSWORD: likhaverse_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: likhaverse-cache
    ports:
      - "6379:6379"

volumes:
  pgdata:
